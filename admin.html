<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroBlog Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f9fafb; color: #1f2937; }
        header { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; padding: 1.2rem 2rem; }
        nav { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a { color: white; text-decoration: none; margin-right: 1rem; }
        .logout-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .logout-btn:hover { background: white; color: #22c55e; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .panel { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.08); }
        .panel h2 { color: #22c55e; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border: 2px solid #e5e7eb; border-radius: 6px; font-family: 'Poppins', sans-serif; }
        .form-group textarea { min-height: 120px; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; }
        .btn-danger { background: #dc2626; color: white; padding: 0.5rem 1rem; font-size: 0.9rem; }
        .btn-edit { background: #3b82f6; color: white; padding: 0.5rem 1rem; font-size: 0.9rem; }
        .post-item { background: #f9fafb; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; border-left: 4px solid #22c55e; }
        .post-item h4 { margin-bottom: 0.5rem; }
        .post-item .category { display: inline-block; background: #dcfce7; color: #15803d; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .post-actions { display: flex; gap: 0.5rem; }
        .message { padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .success { background: #dcfce7; color: #15803d; }
        .error { background: #fee2e2; color: #991b1b; }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌾 AgroBlog Admin</div>
            <div class="nav-links">
                <a href="index.html">← View Blog</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
    </header>

    <div class="container">
        <div id="message"></div>

        <div class="grid">
            <div class="panel">
                <h2>Add/Edit Post</h2>
                <form id="postForm">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Excerpt</label>
                        <input type="text" id="excerpt" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="content" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="mahindi">Corn</option>
                            <option value="machungwa">Orange</option>
                            <option value="sukuma">Vegetables</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Post</button>
                    <button type="button" class="btn" style="background: #6b7280; color: white; margin-left: 0.5rem;" onclick="resetForm()">Clear</button>
                </form>
            </div>

            <div class="panel">
                <h2>Your Posts</h2>
                <div id="postsList"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = '123456';

        // Check password
        function checkPassword() {
            const pass = prompt('Enter admin password:');
            if (pass !== ADMIN_PASSWORD) {
                alert('Wrong password!');
                window.location.href = 'index.html';
            }
        }

        function logout() {
            window.location.href = 'index.html';
        }

        // Posts data
        let posts = JSON.parse(localStorage.getItem('blogPosts')) || [
            { id: '1', title: 'How to Grow Corn Successfully', excerpt: 'Learn farming tips', content: 'Corn is important. Tips:\n1. Sunlight\n2. Good soil\n3. Water\n4. Monitor pests\n\nTakes 60-100 days.', category: 'mahindi' },
            { id: '2', title: 'Orange Farming Tips', excerpt: 'Orange farming guide', content: 'Orange farming needs:\n1. Warm climate\n2. Good soil\n3. Water\n4. Fertilizer\n\n50+ years production.', category: 'machungwa' },
            { id: '3', title: 'Vegetable Garden Essentials', excerpt: 'Start your garden', content: 'Garden basics:\n1. Sunny spot\n2. Rich soil\n3. Seeds\n4. Water\n\nGreat for beginners.', category: 'sukuma' }
        ];

        let editingId = null;

        function savePosts() {
            localStorage.setItem('blogPosts', JSON.stringify(posts));
            loadPosts();
            updateIndexHtml();
        }

        function loadPosts() {
            const list = document.getElementById('postsList');
            if (posts.length === 0) {
                list.innerHTML = '<p style="color: #999;">No posts</p>';
                return;
            }
            list.innerHTML = posts.map(p => `
                <div class="post-item">
                    <h4>${p.title}</h4>
                    <span class="category">${p.category}</span>
                    <p style="color: #666; margin: 0.5rem 0; font-size: 0.9rem;">${p.excerpt}</p>
                    <div class="post-actions">
                        <button class="btn btn-edit" onclick="editPost('${p.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deletePost('${p.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function editPost(id) {
            const post = posts.find(p => p.id === id);
            document.getElementById('title').value = post.title;
            document.getElementById('excerpt').value = post.excerpt;
            document.getElementById('content').value = post.content;
            document.getElementById('category').value = post.category;
            editingId = id;
            window.scrollTo(0, 0);
        }

        function deletePost(id) {
            if (confirm('Delete this post?')) {
                posts = posts.filter(p => p.id !== id);
                savePosts();
                showMsg('Deleted!', 'success');
            }
        }

        function resetForm() {
            document.getElementById('postForm').reset();
            editingId = null;
        }

        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => msg.innerHTML = '', 2000);
        }

        function updateIndexHtml() {
            // This tells you to update index.html manually with new posts
            console.log('Posts updated. Update index.html with new posts data.');
        }

        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const excerpt = document.getElementById('excerpt').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;

            if (editingId) {
                const post = posts.find(p => p.id === editingId);
                post.title = title;
                post.excerpt = excerpt;
                post.content = content;
                post.category = category;
                showMsg('Post updated!', 'success');
                editingId = null;
            } else {
                posts.unshift({
                    id: Date.now().toString(),
                    title, excerpt, content, category
                });
                showMsg('Post added!', 'success');
            }

            resetForm();
            savePosts();
        });

        // Load on start
        checkPassword();
        loadPosts();
    </script>
</body>
</html>
