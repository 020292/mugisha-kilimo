<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroBlog Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f9fafb; color: #1f2937; }
        header { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; padding: 1.2rem 2rem; }
        nav { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; }
        .logout-btn { background: rgba(255, 255, 255, 0.2); border: 2px solid white; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .logout-btn:hover { background: white; color: #22c55e; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .panel { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.08); }
        .panel h2 { color: #22c55e; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #1f2937; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border: 2px solid #e5e7eb; border-radius: 6px; font-family: 'Poppins', sans-serif; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #22c55e; }
        .form-group textarea { min-height: 150px; resize: vertical; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3); }
        .btn-danger { background: #dc2626; color: white; padding: 0.5rem 1rem; }
        .btn-danger:hover { background: #991b1b; }
        .btn-edit { background: #3b82f6; color: white; padding: 0.5rem 1rem; }
        .btn-edit:hover { background: #1d4ed8; }
        .posts-list { max-height: 600px; overflow-y: auto; }
        .post-item { background: #f9fafb; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; border-left: 4px solid #22c55e; }
        .post-item h4 { color: #1f2937; margin-bottom: 0.3rem; }
        .post-item p { color: #6b7280; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .post-item .category { display: inline-block; background: #dcfce7; color: #15803d; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
        .post-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .success { background: #dcfce7; color: #15803d; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .error { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        @media (max-width: 1024px) { .admin-grid { grid-template-columns: 1fr; } .posts-list { max-height: 400px; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌾 AgroBlog Admin</div>
            <div>
                <a href="index.html" style="color: white; text-decoration: none; margin-right: 1rem;">← View Blog</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
    </header>

    <div class="container">
        <div id="message"></div>

        <div class="admin-grid">
            <!-- Add/Edit Post Form -->
            <div class="panel">
                <h2 id="formTitle">Add New Post</h2>
                <form id="postForm">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Excerpt *</label>
                        <input type="text" id="excerpt" required>
                    </div>
                    <div class="form-group">
                        <label>Content *</label>
                        <textarea id="content" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="mahindi">Corn</option>
                            <option value="machungwa">Orange</option>
                            <option value="sukuma">Vegetables</option>
                            <option value="technology">Technology</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Post</button>
                        <button type="button" class="btn" style="background: #6b7280; color: white; margin-left: 0.5rem;" onclick="resetForm()">Reset</button>
                    </div>
                </form>
            </div>

            <!-- Posts List -->
            <div class="panel">
                <h2>Your Posts (<span id="postCount">0</span>)</h2>
                <div class="posts-list" id="postsList"></div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = '123456'; // Change this to your password!

        // Check if logged in
        if (!sessionStorage.getItem('adminLoggedIn')) {
            const password = prompt('Enter admin password:');
            if (password !== PASSWORD) {
                alert('Wrong password!');
                window.location.href = 'index.html';
            } else {
                sessionStorage.setItem('adminLoggedIn', 'true');
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }

        // Load posts from localStorage
        let allPosts = JSON.parse(localStorage.getItem('agroBlogs Posts')) || [
            { id: '1', title: 'How to Grow Corn Successfully', content: 'Corn is one of the most important crops in agriculture. To grow corn successfully, you need to:\n\n1. Choose the right location with plenty of sunlight\n2. Prepare the soil with organic matter\n3. Plant seeds at the right depth\n4. Water regularly\n5. Monitor for pests and diseases\n\nCorn typically takes 60-100 days to mature depending on the variety.', category: 'mahindi', excerpt: 'Learn the best practices for growing corn in your farm', date: new Date('2024-03-20').toISOString() },
            { id: '2', title: 'Orange Farming Tips', content: 'Orange farming requires careful attention to several factors:\n\n1. Climate: Oranges need warm, subtropical climate\n2. Soil: Well-draining soil is essential\n3. Watering: Regular irrigation during dry seasons\n4. Fertilizing: Use balanced fertilizers\n5. Pruning: Remove dead branches\n\nOrange trees can produce fruit for over 50 years with proper care.', category: 'machungwa', excerpt: 'Complete guide to orange farming and harvesting', date: new Date('2024-03-19').toISOString() },
            { id: '3', title: 'Vegetable Garden Essentials', content: 'Starting a vegetable garden is easier than you think. Here are the basics:\n\n1. Choose a sunny spot\n2. Prepare rich soil\n3. Select appropriate vegetables for your climate\n4. Plant seeds at correct spacing\n5. Water consistently\n6. Harvest when ripe\n\nVegetables like tomatoes, lettuce, and beans are great for beginners.', category: 'sukuma', excerpt: 'Essential tips for starting your first vegetable garden', date: new Date('2024-03-18').toISOString() }
        ];

        let editingId = null;

        function savePosts() {
            localStorage.setItem('agroBlogs Posts', JSON.stringify(allPosts));
            loadPosts();
        }

        function loadPosts() {
            const list = document.getElementById('postsList');
            document.getElementById('postCount').textContent = allPosts.length;

            if (allPosts.length === 0) {
                list.innerHTML = '<p style="color: #6b7280; text-align: center;">No posts yet. Create your first post!</p>';
                return;
            }

            list.innerHTML = allPosts.map(post => `
                <div class="post-item">
                    <h4>${post.title}</h4>
                    <span class="category">${post.category}</span>
                    <p>${post.excerpt}</p>
                    <div class="post-actions">
                        <button class="btn btn-edit" onclick="editPost('${post.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deletePost('${post.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function editPost(id) {
            const post = allPosts.find(p => p.id === id);
            if (post) {
                document.getElementById('title').value = post.title;
                document.getElementById('excerpt').value = post.excerpt;
                document.getElementById('content').value = post.content;
                document.getElementById('category').value = post.category;
                document.getElementById('formTitle').textContent = 'Edit Post';
                document.getElementById('submitBtn').textContent = 'Update Post';
                editingId = id;
                window.scrollTo(0, 0);
            }
        }

        function deletePost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                allPosts = allPosts.filter(p => p.id !== id);
                savePosts();
                showMessage('Post deleted successfully!', 'success');
            }
        }

        function resetForm() {
            document.getElementById('postForm').reset();
            document.getElementById('formTitle').textContent = 'Add New Post';
            document.getElementById('submitBtn').textContent = 'Add Post';
            editingId = null;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.innerHTML = `<div class="${type}">${text}</div>`;
            setTimeout(() => msg.innerHTML = '', 3000);
        }

        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const excerpt = document.getElementById('excerpt').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;

            if (editingId) {
                // Update existing post
                const post = allPosts.find(p => p.id === editingId);
                post.title = title;
                post.excerpt = excerpt;
                post.content = content;
                post.category = category;
                showMessage('Post updated successfully!', 'success');
                resetForm();
            } else {
                // Add new post
                const newPost = {
                    id: Date.now().toString(),
                    title,
                    excerpt,
                    content,
                    category,
                    date: new Date().toISOString()
                };
                allPosts.unshift(newPost);
                showMessage('Post added successfully!', 'success');
                document.getElementById('postForm').reset();
            }

            savePosts();
        });

        // Load posts on page load
        loadPosts();
    </script>
</body>
</html>
